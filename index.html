<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Identitas Yoshua</title>
    <link rel="icon" href="galeri/Logo-yadika.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            padding: 30px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: contain;
            /* supaya tidak terpotong */
            object-position: center;
            /* posisi tetap di tengah */
            border: 4px solid #4e73df;
            margin-bottom: 15px;
            background-color: #f0f0f0;
            /* warna jika ada ruang kosong */
        }

        h2 {
            margin: 10px 0 5px;
        }

        p {
            color: gray;
            font-size: 14px;
        }

        .social-links a {
            display: inline-block;
            margin: 10px 5px;
            text-decoration: none;
            color: white;
            background: #4e73df;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            transition: 0.3s;
        }

        .social-links a:hover {
            background: #2e59d9;
        }

        .social-links a i {
            margin-right: 8px;
        }

        .social-links a:nth-child(1) {
            background: #E1306C;
            /* Instagram */
        }

        .social-links a:nth-child(2) {
            background: #333;
            /* GitHub */
        }

        .social-links a:nth-child(3) {
            background: #1877F2;
            /* Facebook */
        }

        .social-links a:hover {
            opacity: 0.85;
        }

        .project {
            margin-top: 15px;
        }

        .project h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #4e73df;
        }

        .project a {
            display: inline-block;
            text-decoration: none;
            background: #1cc88a;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 13px;
            transition: 0.3s;
        }

        .project a:hover {
            background: #17a673;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="galeri/foto saya.jfif" alt="Foto Profil" class="profile-img">
        <h2>Yoshua Raamses XII TKJ 3</h2>
        <p>Pelajar | Programmer Pemula | Web Developer</p><hr>
        <p>"Ingin Menjadi Programmer Handal Namun Enggan Ngoding"</p><hr>

        <div class="project">
            <h3>Project Online Saya </h3>
            <a href="https://pagpibkaset.netlify.app/" target="_blank">
                🌐 Website Gereja
            </a>
        </div>

        <div class="social-links">
            <a href="https://instagram.com/yoshua_lly01.27" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://github.com/yosh-raams" target="_blank">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="https://facebook.com/profile.php?id=100085817582650" target="_blank">
                <i class="fab fa-facebook"></i> Facebook
            </a>
        </div>
    </div>

</body>

</html>
