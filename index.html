<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Identitas Yoshua</title>
    <link rel="icon" href="galeri/logo-yadika.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgb(255, 255, 255);
            width: 100%;
            max-width: 400px; 
            border-radius: 20px;
            box-shadow: 0 15px 35px rgb(0, 0, 0);
            text-align: center;
            padding: 40px 25px;
            margin-top: 50px; 
            position: relative;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover; 
            border: 4px solid #4e73df;
            transition: transform 0.3s ease;
            object-position: 50% 20%;
            margin: -95px auto 15px; 
            display: block;
            background-color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }

        .profile-img:hover {
            transform: scale(1.1); 
        }

        
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap');

        h2 {
            font-family: 'Montserrat', sans-serif;
            margin: 20px 0 5px;
            font-size: 1.6rem;
            color: #4e73df;
            text-shadow: 2px 2px 0px rgb(0, 0, 0); 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .bio {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .quote {
            font-style: italic;
            font-size: 13px;
            color: #888;
            border-top: 1px solid #cfcfcf;
            border-bottom: 1px solid #cfcfcf;
            padding: 10px 0;
            margin: 15px 0;
        }

    
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px; 
            margin-top: 20px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            position: relative;
        }

        .link-item i {
            position: absolute;
            left: 20px;
            font-size: 18px;
        }

        .instagram { background-color: #E1306C; }
        .github { background-color: #333; }
        .facebook { background-color: #1877F2; }
        .website { background-color: #1cc88a; }

        .link-item:hover {
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            filter: brightness(1.1);
        }

        .link-item:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="galeri/foto gw.jpeg" alt="Foto Profil" class="profile-img">
        <h2>Yoshua Raamses</h2>
        <p class="bio">XII TKJ 3 SMK YADIKA 4<br>Pelajar | Programmer Pemula | Web Developer</p>
        
        <p class="quote">"Ingin Menjadi Programmer Handal Namun Enggan Ngoding"</p>

        <div class="links-container">
            <a href="https://pagpibkaset.netlify.app/" class="link-item website" target="_blank">
                <i class="fas fa-globe"></i> Project Saya
            </a>

            <a href="https://instagram.com/yoshua_lly01.27" class="link-item instagram" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a href="https://github.com/yosh-raams" class="link-item github" target="_blank">
                <i class="fab fa-github"></i> GitHub
            </a>

            <a href="https://facebook.com/profile.php?id=100085817582650" class="link-item facebook" target="_blank">
                <i class="fab fa-facebook"></i> Facebook
            </a>
        </div>
    </div>

</body>

</html>
